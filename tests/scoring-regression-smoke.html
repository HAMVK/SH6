<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scoring Regression Smoke</title>
  <style>
    body {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      margin: 1.25rem;
      color: #0f172a;
      background: #f8fafc;
    }
    .status {
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    .status-pass { color: #166534; }
    .status-fail { color: #b91c1c; }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      border-radius: 0.5rem;
      padding: 0.75rem;
      max-height: 70vh;
      overflow: auto;
    }
    .check-list {
      margin: 0 0 1rem 0;
      padding: 0;
      list-style: none;
    }
    .check-list li {
      margin: 0.35rem 0;
    }
    .ok { color: #166534; }
    .bad { color: #b91c1c; }
  </style>
</head>
<body>
  <h1>Scoring Regression Smoke</h1>
  <p>Runs the built-in SH6 scoring regression helper inside the app runtime.</p>
  <div id="status" class="status">RUNNING</div>
  <ul id="checks" class="check-list"></ul>
  <pre id="result">Waiting for test result...</pre>
  <iframe id="appFrame" src="../index.html" hidden title="SH6 app"></iframe>

  <script>
    (async () => {
      const statusEl = document.getElementById('status');
      const listEl = document.getElementById('checks');
      const resultEl = document.getElementById('result');
      const frame = document.getElementById('appFrame');

      function setResult(overallOk, payload) {
        statusEl.textContent = overallOk ? 'PASS' : 'FAIL';
        statusEl.className = `status ${overallOk ? 'status-pass' : 'status-fail'}`;
        listEl.innerHTML = '';
        const checks = Array.isArray(payload?.checks) ? payload.checks : [];
        checks.forEach((entry) => {
          const li = document.createElement('li');
          li.className = entry.passed ? 'ok' : 'bad';
          const mark = entry.passed ? '✓' : '✗';
          li.textContent = `${mark} ${entry.name}`;
          listEl.appendChild(li);
        });
        resultEl.textContent = JSON.stringify(payload, null, 2);
      }

      async function waitForRegressionHelper(timeoutMs) {
        const deadline = Date.now() + timeoutMs;
        while (Date.now() < deadline) {
          const win = frame.contentWindow;
          if (win && win.SH6 && typeof win.SH6.runScoringRegressionChecks === 'function') {
            return win.SH6.runScoringRegressionChecks();
          }
          await new Promise((resolve) => setTimeout(resolve, 250));
        }
        throw new Error('Timed out waiting for window.SH6.runScoringRegressionChecks');
      }

      try {
        await new Promise((resolve, reject) => {
          frame.addEventListener('load', resolve, { once: true });
          frame.addEventListener('error', () => reject(new Error('Unable to load SH6 app iframe')), { once: true });
        });
        const payload = await waitForRegressionHelper(30000);
        setResult(Boolean(payload?.passed), payload);
      } catch (err) {
        setResult(false, {
          passed: false,
          checks: [],
          error: err && err.message ? err.message : String(err)
        });
      }
    })();
  </script>
</body>
</html>
